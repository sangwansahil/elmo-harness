name: function-calling
prompt: build me a function-calling expert under 2b params that scores 75+ on bfcl

base_model: mlx-community/Qwen2.5-1.5B-Instruct-4bit
backend: auto

capabilities:
  - name: tool_selection
    description: choose the right tool name from the catalog
    verifier: function_call
    weight: 1.0
  - name: arguments
    description: extract structurally correct arguments
    verifier: json_schema
    weight: 1.5
  - name: parallel_calls
    description: emit multiple tool calls at once when warranted
    verifier: function_call
    weight: 1.0
  - name: refusal
    description: refuse or clarify on ambiguous input
    verifier: judge
    weight: 0.5

dataset:
  source: "hf:Salesforce/xlam-function-calling-60k"
  split: train
  max_rows: 2000

train:
  method: lora
  lora_rank: 16
  lora_alpha: 32
  lora_dropout: 0.05
  learning_rate: 0.0002
  batch_size: 4
  max_seq_len: 2048
  max_steps: 200
  warmup_steps: 20
  seed: 42

eval:
  benchmark: bfcl-simple
  max_examples: 100
  target_score: 0.75

budget:
  max_iterations: 1
  max_dollars: 0.0
  max_wallclock_hours: 2.0

# the foundry block is optional. with it disabled (default), elmo trains on raw
# xlam. with it enabled and a planner+generator provider configured, elmo first
# plans scenarios with a strong model, generates rows with a cheap model,
# verifier-filters them, and trains on the result.
foundry:
  enabled: false
  rows_target: 200
  scenarios_per_brief: 50
  mix_with_raw_fraction: 0.0  # 0.0 = all synthetic; 1.0 = all raw

# roles bind planner/generator/judge to (provider, model). leave blank to use
# defaults based on which provider env keys are set (see `elmo doctor`).
roles:
  planner: null
  generator: null
  judge: null

